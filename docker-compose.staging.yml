version: "3.8"

services:
  db:
    image: postgres:14
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-valentin_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-valentin2026_staging}
      POSTGRES_DB: ${POSTGRES_DB:-valentin_cuisine_staging}
    volumes:
      - ${PGDATA_PATH:-/var/lib/valentin_cuisine_staging_pgdata}:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5443:5432"

  app:
    image: valentin-cuisine:staging
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-valentin_user}:${POSTGRES_PASSWORD:-valentin2026_staging}@db:5432/${POSTGRES_DB:-valentin_cuisine_staging}
    env_file:
      - .env
    ports:
      - "0.0.0.0:${PORT:-3024}:3000"
