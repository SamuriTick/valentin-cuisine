name: Build and Deploy Valentin Cuisine

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker buildx build --platform linux/amd64 -t valentin-cuisine:latest --load .

      - name: Save Docker image to tar.gz
        run: docker save valentin-cuisine:latest | gzip > valentin-cuisine.tar.gz

      - name: Copy image and config to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_PROD_HOST }}
          username: ${{ secrets.VPS_PROD_USER }}
          key: ${{ secrets.VPS_PROD_SSH_KEY }}
          source: "valentin-cuisine.tar.gz,docker-compose.yml,deploy-valentin-cuisine.sh"
          target: "/root/docker-images/valentin-cuisine/"

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_PROD_HOST }}
          username: ${{ secrets.VPS_PROD_USER }}
          key: ${{ secrets.VPS_PROD_SSH_KEY }}
          command_timeout: 10m
          script: |
            chmod +x /root/docker-images/valentin-cuisine/deploy-valentin-cuisine.sh || true
            /root/docker-images/valentin-cuisine/deploy-valentin-cuisine.sh
